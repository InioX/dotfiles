layerrule {
  name = no_anim_for_selection
  no_anim = on
  match:namespace = selection
}

windowrule = float true, match:initial_title ^(Open Folder)$
windowrule = center true, match:initial_title ^(Open Folder)$
windowrule = size 1000 600, match:initial_title ^(Open Folder)$
