monitor=,preferred,auto,1

# TODO: Find out why this doesnt work inside autostart.conf
exec-once = ~/.config/hypr/scripts/welcome.sh

source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf

#device:MSFT0001:00 06CB:CE2D Touchpad {
#    accel_profile = flat
#    sensitivity = 0.8
#}

monitor = eDP-1, 1920x1080@144, 0x0, 1, vrr, 3

# Theming
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,20
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
# env = QT_QPA_PLATFORMTHEME,qt6ct

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland
env = __GL_GSYNC_ALLOWED, 1
# env = GBM_BACKEND,nvidia-drm

# Other
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb

misc {
   vrr = 3
}

input {
    kb_layout = us,ru(phonetic),cz
    kb_options = grp:win_space_toggle

    numlock_by_default = true
    sensitivity = -0.2

    touchpad {
        natural_scroll = yes
	    disable_while_typing = true
	    tap-to-click = true
    }
}

general {
    # gaps_in = 5
    gaps_in = 0
    # gaps_out = 5
    gaps_out = 0
    border_size = 2
    #cursor_inactive_timeout = 0
    
    layout = dwindle
    allow_tearing = true

    border_size = 0
}

render {
    # direct_scanout = 2
}

cursor {
    inactive_timeout = 0
    no_hardware_cursors = 0
}

gestures {
    gesture = 3, horizontal, workspace
}

decoration {
    rounding = 25

    # drop_shadow = false

    # dim_inactive = true
    
    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }

    blur { 
        enabled = false
    }

    rounding = 0
}

animations {
    enabled = true
    
    # https://m3.material.io/styles/motion/easing-and-duration/applying-easing-and-duration
    # bezier = emphasized, 0.2, 0, 0, 1
    # bezier = emphasized_decelerate, 0.2, 0, 0, 1
    # bezier = emphasized_accelerate, 0.2, 0, 0, 1
    
    # animation = windowsIn, 1, 5, emphasized_decelerate, popin
    # animation = windowsOut, 1, 2, emphasized_accelerate, popin
    # animation = border, 1, 5, emphasized
    # animation = fadeDim, 1, 5, emphasized
    # animation = fadeIn, 1, 5, emphasized
    # animation = fadeOut, 1, 2, emphasized
    # animation = workspaces, 1, 5, emphasized, slide

    # End-4

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration

    # Animation configs
    # animation = windows, 1, 3, md3_decel, popin 60%
    # animation = windowsIn, 1, 3, md3_decel, popin 60%
    # animation = windowsOut, 1, 3, md3_accel, popin 60%
    # animation = border, 1, 10, default
    # animation = fade, 1, 3, md3_decel

    animation = windows, 0, 3, md3_decel, popin 60%
    animation = windowsIn, 0, 3, md3_decel, popin 60%
    animation = windowsOut, 0, 3, md3_accel, popin 60%
    animation = border, 0, 10, default
    animation = fade, 0, 3, md3_decel
    
    animation = layers, 1, 1, default

    animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    # animation = layersOut, 1, 1.6, menu_accel, slide
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 0, 7, menu_decel, slide
    
    # animation = workspaces, 1, 2.5, softAcDecel, slide
    # animation = workspaces, 1, 7, menu_decel, slidefade 15%
    # animation = workspaces, 1, 7, menu_decel, slide 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    # animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

dwindle {
    pseudotile = yes 
    preserve_split = yes 
}

